## when deploying start with just aucore, then sequentially add hl7au, ereq otherwise potential configmap duplicate name issue can occur
# ~1min 50sec to deploy hl7au with config
cdrNodes:
  masterdev:
    enabled: false
  aucore:
    name: aucore
    enabled: true
    config:
      locked: false
      database: true
    modules:
      clustermgr:
        config:
          db.schema_update_mode: UPDATE
      persistence:
        config:
          seed.base_validation_resources: true
          package_registry.resource_status_validation_filter.enabled: false
          package_registry.load_specs_asynchronously: false
          package_registry.startup_installation_specs: "classpath:/config_seeding/package-au-base-6.0.0.json classpath:/config_seeding/package-au-patient-summary-0.5.0-preview.json classpath:/config_seeding/package-aucore-2.0.0.json classpath:/config_seeding/package-international-patient-summary-2.0.0.json"
          resource_types.supported.whitelist: "MedicationStatement,CommunicationRequest,Task,Consent,ServiceRequest,Device,Composition,StructureDefinition,SearchParameter,Questionnaire,StructureMap,AllergyIntolerance,Condition,Encounter,Immunization,Location,Observation,Organization,Patient,Practitioner,PractitionerRole,Procedure,Medication,MedicationRequest,Coverage,Specimen,RelatedPerson,HealthcareService,QuestionnaireResponse"
          metadata.resource_counts.enabled: false
          validator.local_reference_policy: "NOT_VALIDATED"
          validator.unknown_codesystem_validation_policy: "GENERATE_WARNING"
          remote_term_svc.enabled: true
          remote_term_svc.base_url: "https://tx.dev.hl7.org.au/fhir"
          dao_config.default_total_mode: "NONE"
          dao_config.delete_enabled: true
          dao_config.enforce_referential_integrity_on_delete.enabled: true
          dao_config.auto_create_placeholder_reference_targets.enabled: false
          dao_config.allow_multiple_delete.enabled: false
          dao_config.allows_external_references.enabled: true
          dao_config.allow_external_references.enabled: true
          dao_config.server_id_mode: "UUID" #AUTOGENERATE instead?
          dao_config.fetch_size.default_maximum: 1000
          dao_config.allow_contains_searches: true
          dao_config.match_url_cache.enabled: true
          dao_config.client_id_mode: "ANY"
          subscription.rest_hook_enabled: true
          subscription.message.enabled: true
          subscription.cross_partition_enabled: false # need to check with heath on this
          versioned_references.allow_at_paths: "AuditEvent.entity.what, MessageHeader.focusProvenance.target"
          versioned.references.respect_for_search_includes: true
          partitioning.enabled: true
          partitioning.partition_selection_mode: "REQUEST_TENANT"
          # search_parameter_seeding.disable_patterns: ""
          # search_parameter_seeding.enable_patterns: ""
          # ig_support.ips.generation_strategy_class: "ca.uhn.fhir.jpa.ig.DefaultIpsGenerationStrategy" # removed as causes issues, better to stay on default https://smilecdr.com/docs/v/2024.08.R01/configuration_categories/fhir_storage_ig_support.html
          db.driver: POSTGRES_9_4
          db.url: jdbc:postgresql://#{env['AUCORE_DB_URL']}:#{env['AUCORE_DB_PORT']}/#{env['AUCORE_DB_DATABASE']}?sslmode=require
          db.password: "#{env['AUCORE_DB_PASS']}"
          db.username: "#{env['AUCORE_DB_USER']}"
      fhir_endpoint:
        config:
          request_validating.enabled: true
          partitioning.tenant_identification_strategy: "URL_BASED"
          context_path: "aucore/fhir"
          # base_url.fixed: ""
          # security.oic.enabled: true
      package_registry:
        config:
          context_path: "aucore/package"
      admin_web:
        config:
          context_path: "aucore/console"
      admin_json:
        config:
          context_path: "aucore/admin-json"
      fhirweb_endpoint:
        enabled: true
        config:
          context_path: "aucore/fhirweb"
      smart_auth:
        name: security_out_smart
        config:
          context_path: "aucore/smartauth"
          auth_request_detail.whitelist: "aud,grant_type,scope,launch"
          # openid.signing.keystore_id: default-keystore # do later
          # post_authorize_script.text: "" ## do later
          cors.enabled: true
      security_in_smart:
        name: security_in_smart
        type: SECURITY_IN_SMART
        enabled: true
        config:
          seed.users.file: "classpath:/config_seeding/smart-users.json"
          max_failed_logins_until_lock: 20 # Increased from 5 to 20
  hl7au:
    name: hl7au
    enabled: true
    config:
      database: true
    modules:
      persistence:
        config:
          seed.base_validation_resources: true
          package_registry.resource_status_validation_filter.enabled: false
          package_registry.load_specs_asynchronously: false
          package_registry.startup_installation_specs: "classpath:/config_seeding/package-au-base-6.0.0.json classpath:/config_seeding/package-au-patient-summary-0.4.0-draft.json classpath:/config_seeding/package-aucore-2.0.0.json"
          resource_types.supported.whitelist: "MedicationStatement,CommunicationRequest,Task,Consent,ServiceRequest,Device,Composition,StructureDefinition,SearchParameter,Questionnaire,StructureMap,AllergyIntolerance,Condition,Encounter,Immunization,Location,Observation,Organization,Patient,Practitioner,PractitionerRole,Procedure,Medication,MedicationRequest,Coverage,Specimen,RelatedPerson,HealthcareService,QuestionnaireResponse"
          metadata.resource_counts.enabled: false
          validator.local_reference_policy: "NOT_VALIDATED"
          validator.unknown_codesystem_validation_policy: "GENERATE_WARNING"
          remote_term_svc.enabled: true
          remote_term_svc.base_url: "https://tx.dev.hl7.org.au/fhir"
          dao_config.default_total_mode: "NONE"
          dao_config.delete_enabled: true
          dao_config.enforce_referential_integrity_on_delete.enabled: true
          dao_config.auto_create_placeholder_reference_targets.enabled: false
          dao_config.allow_multiple_delete.enabled: false
          dao_config.allow_external_references.enabled: true
          partitioning.enabled: true
          partitioning.partition_selection_mode: "REQUEST_TENANT"
         #  search_parameter_seeding.disable_patterns: ""
         #  search_parameter_seeding.enable_patterns: ""
          db.driver: POSTGRES_9_4
          db.url: jdbc:postgresql://#{env['HL7AU_DB_URL']}:#{env['HL7AU_DB_PORT']}/#{env['HL7AU_DB_DATABASE']}?sslmode=require
          db.password: "#{env['HL7AU_DB_PASS']}"
          db.username: "#{env['HL7AU_DB_USER']}"
      fhir_endpoint:
        config:
          request_validating.enabled: true
          partitioning.tenant_identification_strategy: "URL_BASED"
          context_path: "hl7au/fhir"
      package_registry:
        config:
          context_path: "hl7au/package"
      admin_web:
        config:
          context_path: "hl7au/console"
      admin_json:
        config:
          context_path: "hl7au/admin-json"
      fhirweb_endpoint:
        enabled: true
        config:
          context_path: "/hl7au/fhirweb"
  ereq:
    name: ereq
    enabled: true
    config:
      locked: false
      database: true
    modules:
      persistence:
        config:
          seed.base_validation_resources: false
          package_registry.resource_status_validation_filter.enabled: false
          package_registry.load_specs_asynchronously: false
          package_registry.startup_installation_specs: "classpath:/config_seeding/package-au-base-6.0.0.json classpath:/config_seeding/package-au-erequesting-1.0.0.json classpath:/config_seeding/package-aucore-2.0.0.json classpath:/config_seeding/package-international-patient-summary-2.0.0.json"
          resource_types.supported.whitelist: "Medication,AllergyIntolerance,MedicationRequest,Immunization,HealthcareService, Specimen,MedicationStatement,CommunicationRequest,Task,Consent,ServiceRequest,Device,Composition,StructureDefinition,SearchParameter,CodeSystem,ValueSet,ServiceRequest,Task,Organization,Location,Patient,Practitioner,PractitionerRole,Encounter,Coverage,Condition,DocumentReference,Observation,Procedure,RelatedPerson"
          metadata.resource_counts.enabled: false
          validator.local_reference_policy: "NOT_VALIDATED"
          validator.unknown_codesystem_validation_policy: "GENERATE_WARNING"
          remote_term_svc.enabled: true
          remote_term_svc.base_url: "https://tx.dev.hl7.org.au/fhir"
          dao_config.default_total_mode: "NONE"
          dao_config.delete_enabled: true
          dao_config.enforce_referential_integrity_on_delete.enabled: true
          dao_config.auto_create_placeholder_reference_targets.enabled: false
          dao_config.allow_external_references.enabled: true
          dao_config.allow_multiple_delete.enabled: false
          partitioning.enabled: true
          partitioning.partition_selection_mode: "REQUEST_TENANT"
          indexing.index_missing_search_params: "ENABLED"
          # search_parameter_seeding.disable_patterns: |
          #  ServiceRequest:*
          #  Task:*
          #  Organization:*
          #  Patient:*
          #  Practitioner:*
          #  PractitionerRole:*
          #  Encounter:*
          #  Coverage:*
          #  Condition:*
          #  DocumentReference:*
          #  Location:*
          #  Procedure:*
          #  RelatedPerson:*
         # search_parameter_seeding.enable_patterns: |
           # Subscription:*
           # SearchParameter:*
           # StructureDefinition:*
           # CodeSystem:*
           # ValueSet:*
           # ServiceRequest:requisition
           # ServiceRequest:requester
           # ServiceRequest:patient
           # ServiceRequest:identifier
           # Task:group-identifier
           # Task:owner
           # Task:patient
           # Task:requester
           # Task:status
           # Task:focus
           # Task:_tag
           # Task:owner
           # PractitionerRole:identifier
           # Practitioner:identifier
           # Organization:identifier
           # Patient:identifier
          db.driver: POSTGRES_9_4
          db.url: jdbc:postgresql://#{env['EREQ_DB_URL']}:#{env['EREQ_DB_PORT']}/#{env['EREQ_DB_DATABASE']}?sslmode=require
          db.password: "#{env['EREQ_DB_PASS']}"
          db.username: "#{env['EREQ_DB_USER']}"
          db.schema_update_mode: UPDATE  # Changed from NONE
      fhir_endpoint:
        config:
          request_validating.enabled: true
          request_validating.fail_on_severity: "FATAL"
          partitioning.tenant_identification_strategy: "URL_BASED"
          context_path: "ereq/fhir"
      package_registry:
        config:
          context_path: "ereq/package"
      admin_web:
        config:
          context_path: "ereq/console"
      admin_json:
        config:
          context_path: "ereq/admin-json"
      fhirweb_endpoint:
        enabled: true
        config:
          context_path: "/ereq/fhirweb"

modules:
  useDefaultModules: true
  audit:
    enabled: false
  subscription:
    enabled: false
  transaction:
    enabled: false
