name: Implementation Guide Release Request
description: Request to add or update a FHIR Implementation Guide on the Sparked FHIR Server
title: "[IG Release]: "
labels: ["ig-release", "needs-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Implementation Guide Release Request
        Use this template to request deployment of a new or updated FHIR Implementation Guide (IG) to the Sparked FHIR Server.

        **For non-technical users**: Please fill out as much as you can. Our team will help with technical details.

  - type: input
    id: ig-name
    attributes:
      label: Implementation Guide Name
      description: What is the name of the IG? (e.g., "International Patient Summary", "AU eRequesting")
      placeholder: "International Patient Summary"
    validations:
      required: true

  - type: input
    id: ig-version
    attributes:
      label: IG Version
      description: Which version should be deployed? (e.g., "3.0.0", "1.2.0-ballot")
      placeholder: "3.0.0"
    validations:
      required: true

  - type: input
    id: ig-package-id
    attributes:
      label: NPM Package ID (if known)
      description: The NPM package identifier (e.g., "hl7.fhir.uv.ips"). Leave blank if unsure.
      placeholder: "hl7.fhir.uv.ips"
    validations:
      required: false

  - type: input
    id: ig-url
    attributes:
      label: IG URL or Documentation Link
      description: Link to the IG specification or documentation
      placeholder: "https://hl7.org/fhir/uv/ips/"
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Target Environment
      description: Which environment should this be deployed to?
      options:
        - Development
        - Production
        - All environments
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How urgent is this request?
      options:
        - Low - Can wait for next scheduled release
        - Medium - Needed within 2 weeks
        - High - Needed within 1 week
        - Critical - Blocking work
    validations:
      required: true

  - type: input
    id: timeline
    attributes:
      label: Target Completion Date
      description: When do you need this completed? (YYYY-MM-DD)
      placeholder: "2025-11-15"
    validations:
      required: false

  - type: dropdown
    id: request-type
    attributes:
      label: Request Type
      description: Is this a new IG or an update to an existing one?
      options:
        - New IG - Not currently on the server
        - Update - Upgrading existing IG to new version
        - Rollback - Revert to previous version
    validations:
      required: true

  - type: textarea
    id: business-justification
    attributes:
      label: Business Justification
      description: Why is this IG needed? What use case does it support?
      placeholder: "We need IPS 3.0.0 to support the upcoming cross-border data exchange pilot project scheduled for September."
    validations:
      required: true

  - type: textarea
    id: test-data
    attributes:
      label: Test Data Requirements
      description: |
        Do you need test data loaded for this IG?
        - How much test data? (e.g., "50 sample patients", "minimal examples")
        - How often should it refresh?
        - Any anonymization requirements?
      placeholder: |
        - Need 20 sample IPS documents
        - Refresh weekly during testing phase
        - Must be fully anonymized/synthetic data
    validations:
      required: false

  - type: textarea
    id: config-changes
    attributes:
      label: Known Configuration Changes
      description: |
        If you know what configuration changes are needed, list them here.
        **Most users can leave this blank** - the technical team will determine requirements.

        For technical users, this might include:
        - Changes to simplified-multinode.yaml (new modules, endpoints)
        - Database requirements
        - Security/access requirements
      placeholder: |
        Example technical details:
        - Need new FHIR endpoint at /fhir/ips
        - Requires separate database module
        - Public read access, authenticated write
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How will you verify this is working correctly? What tests should pass?
      placeholder: |
        - Can retrieve IG resources via FHIR API
        - StructureDefinitions validate correctly
        - Sample test data loads without errors
        - Documentation updated with new endpoints
    validations:
      required: true

  - type: checkboxes
    id: rollback
    attributes:
      label: Rollback Plan
      description: Please confirm understanding of rollback procedures
      options:
        - label: I understand that if issues are found, this may be rolled back to the previous version
          required: true
        - label: I will be available to verify the deployment works as expected
          required: false

  - type: textarea
    id: stakeholders
    attributes:
      label: Stakeholders & Approvers
      description: Who should be notified when this is complete? Who needs to approve this?
      placeholder: |
        - Requestor: @username
        - Technical Lead: @username
        - Business Owner: Name/Team
        - Notify: Sparked content team
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful?
      placeholder: "This relates to the work being done for the September 1-2 event."
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ### What happens next?
        1. The technical team will review this request and add implementation details
        2. You'll receive updates as status labels change: `needs-review` → `approved` → `in-progress` → `testing` → `complete`
        3. You'll be notified on Zulip when deployment is complete
        4. Please verify the deployment meets your acceptance criteria
