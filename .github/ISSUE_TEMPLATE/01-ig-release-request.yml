name: Implementation Guide Release Request
description: Request to add or update a FHIR Implementation Guide on the Sparked FHIR Server
title: "[IG Release]: "
labels: ["ig-release", "needs-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Implementation Guide Release Request
        Use this template to request deployment of a new or updated FHIR Implementation Guide (IG) to the Sparked FHIR Server.

        **For non-technical users**: Please fill out as much as you can. Our team will help with technical details.

  - type: input
    id: ig-name
    attributes:
      label: Implementation Guide Name
      description: What is the name of the IG? (e.g., "International Patient Summary", "AU eRequesting")
      placeholder: "International Patient Summary"
    validations:
      required: true

  - type: input
    id: ig-version
    attributes:
      label: IG Version
      description: Which version should be deployed? (e.g., "3.0.0", "1.2.0-ballot")
      placeholder: "3.0.0"
    validations:
      required: true

  - type: input
    id: ig-package-id
    attributes:
      label: NPM Package ID (if known)
      description: The NPM package identifier (e.g., "hl7.fhir.uv.ips"). Leave blank if unsure.
      placeholder: "hl7.fhir.uv.ips"
    validations:
      required: false

  - type: input
    id: ig-url
    attributes:
      label: IG URL or Documentation Link
      description: Link to the IG specification or documentation
      placeholder: "https://hl7.org/fhir/uv/ips/"
    validations:
      required: false

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How urgent is this request?
      options:
        - Low - Can wait for next scheduled release
        - Medium - Needed within 2 weeks
        - High - Needed within 1 week
        - Critical - Blocking work
    validations:
      required: true

  - type: dropdown
    id: request-type
    attributes:
      label: Request Type
      description: Is this a new IG or an update to an existing one?
      options:
        - New IG - Not currently on the server
        - Update - Upgrading existing IG to new version
        - Rollback - Revert to previous version
    validations:
      required: true

  - type: checkboxes
    id: target-nodes
    attributes:
      label: Target SmileCDR Nodes
      description: |
        Select which SmileCDR nodes should have this IG package loaded.

        **Node Descriptions:**
        - **aucore**: AU Core FHIR Server - General Australian FHIR profiles and validation
        - **hl7au**: HL7 AU Base Server - Base Australian specifications and extensions
        - **ereq**: eRequesting Server - Electronic requesting workflows and integrations

        💡 **Tip**: Most Australian IGs should be on both `aucore` and `hl7au`. eRequesting-specific IGs should also include `ereq`.
      options:
        - label: aucore (AU Core FHIR Server)
          required: false
        - label: hl7au (HL7 AU Base Server)
          required: false
        - label: ereq (eRequesting Server)
          required: false

  - type: textarea
    id: business-justification
    attributes:
      label: Business Justification
      description: Why is this IG needed? What use case does it support? Is this for a specific event?
      placeholder: "We need IPS 3.0.0 to support the upcoming December Connectathon event."
    validations:
      required: true

  - type: textarea
    id: test-data
    attributes:
      label: Test Data or Examples Requirements
      description: |
        Do you need test data or specific examples loaded for this IG?
        - How much test data? (e.g., "50 sample patients", "minimal examples")
        - How often should it refresh?
      placeholder: |
        - Need latest branch of https://github.com/hl7au/au-fhir-test-data 
        - Need /examples folder from the IPS IG
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How will you verify this is working correctly? What tests should pass?
      placeholder: |
        - Can retrieve IG resources via FHIR API
        - StructureDefinitions validate correctly
        - Sample test data loads without errors
        - Documentation updated with new endpoints
    validations:
      required: true

  - type: checkboxes
    id: package-options
    attributes:
      label: Package Installation Options
      description: |
        Configure how this IG package should be loaded (leave unchecked for defaults)

        **installMode**: Controls whether the package is just stored or also installed
        - Unchecked (default): `STORE_ONLY` - Package is stored but not automatically installed
        - Checked: `STORE_AND_INSTALL` - Package is both stored and installed

        **fetchDependencies**: Controls whether to automatically fetch package dependencies
        - Unchecked (default): `false` - Dependencies not fetched
        - Checked: `true` - Dependencies automatically fetched
      options:
        - label: Install this package automatically (STORE_AND_INSTALL)
        - label: Fetch dependencies automatically

  - type: checkboxes
    id: rollback
    attributes:
      label: Rollback Plan
      description: Please confirm understanding of rollback procedures
      options:
        - label: I understand that if issues are found, this may be rolled back to the previous version
          required: true
        - label: I will be available to verify the deployment works as expected
          required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: |
        Any additional context or configuration changes that might be required.
      placeholder: |
        Example additional details:
        - New modules, endpoints or access requirements
        - Custom packageUrl if not using packages.fhir.org
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ### What happens next?
        1. The technical team will review this request and add implementation details
        2. You'll receive updates as status labels change: `needs-review` → `approved` → `in-progress` → `testing` → `complete`
        3. You'll be notified on Zulip when deployment is complete
        4. Please verify the deployment meets your acceptance criteria
