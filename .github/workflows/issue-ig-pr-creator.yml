name: IG Release Change PR Creator

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate-ig-pr:
    name: Generate IG Release PR
    runs-on: ubuntu-latest
    # Only run when 'ready-for-automation' label is added to an IG release issue
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'ready-for-automation' && contains(github.event.issue.labels.*.name, 'ig-release')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Get issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue?.number || parseInt('${{ inputs.issue_number }}') || null;
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            // Parse issue body to extract structured data
            const body = issue.body || '';

            // Extract fields from GitHub issue form
            const extractField = (label) => {
              const regex = new RegExp(`### ${label}\\s*([\\s\\S]*?)(?=###|$)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            };

            const igName = extractField('Implementation Guide Name');
            const igVersion = extractField('IG Version');
            const packageId = extractField('NPM Package ID \\(if known\\)') || '';
            const requestType = extractField('Request Type');

            // Extract target nodes from checkboxes
            const targetNodesSection = extractField('Target SmileCDR Nodes');
            const selectedNodes = [];

            if (targetNodesSection.includes('[x]') || targetNodesSection.includes('[X]')) {
              const lines = targetNodesSection.split('\n');
              for (const line of lines) {
                if (line.includes('[x]') || line.includes('[X]')) {
                  if (line.includes('aucore')) selectedNodes.push('aucore');
                  if (line.includes('hl7au')) selectedNodes.push('hl7au');
                  if (line.includes('ereq')) selectedNodes.push('ereq');
                }
              }
            }

            // Extract deployment options from checkboxes
            const deploymentOptionsSection = extractField('Deployment Options');
            const deployImmediately = deploymentOptionsSection.includes('[x]') || deploymentOptionsSection.includes('[X]');

            // Extract package options from checkboxes
            const packageOptions = extractField('Package Installation Options');

            // Check if "Install this package automatically" is checked
            const installModeChecked = packageOptions.includes('[X]') || packageOptions.includes('[x]');
            const installMode = installModeChecked ? 'STORE_AND_INSTALL' : 'STORE_ONLY';

            // Check if "Fetch dependencies automatically" is checked (second checkbox)
            const lines = packageOptions.split('\n');
            const fetchDepsChecked = lines.length > 1 && (lines[1].includes('[X]') || lines[1].includes('[x]'));
            const fetchDependencies = fetchDepsChecked;

            // Generate safe filenames
            const safeName = igName.toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '');

            const branchName = `ig-release/issue-${issueNumber}-${safeName}-${igVersion}`;
            const packageFileName = `package-${safeName}-${igVersion}.json`;

            core.setOutput('issue_number', issueNumber);
            core.setOutput('ig_name', igName);
            core.setOutput('ig_version', igVersion);
            core.setOutput('package_id', packageId);
            core.setOutput('request_type', requestType);
            core.setOutput('install_mode', installMode);
            core.setOutput('fetch_dependencies', fetchDependencies);
            core.setOutput('branch_name', branchName);
            core.setOutput('package_file_name', packageFileName);
            core.setOutput('safe_name', safeName);
            core.setOutput('selected_nodes', selectedNodes.join(','));
            core.setOutput('selected_nodes_count', selectedNodes.length);
            core.setOutput('deploy_immediately', deployImmediately);

            // Check if we have required info
            if (!igName || !igVersion) {
              core.setFailed('Missing required fields: IG Name or Version');
              return;
            }

            if (selectedNodes.length === 0) {
              core.setFailed('No target nodes selected');
              return;
            }

            return {
              issueNumber,
              igName,
              igVersion,
              packageId,
              requestType,
              branchName,
              packageFileName,
              safeName
            };

      - name: Check if required fields present
        if: steps.issue.outputs.ig_name == '' || steps.issue.outputs.ig_version == ''
        run: |
          echo "::error::Missing required fields in issue"
          gh issue comment ${{ steps.issue.outputs.issue_number }} --body "❌ **Automation Failed**

          Missing required information:
          - IG Name: ${{ steps.issue.outputs.ig_name }}
          - IG Version: ${{ steps.issue.outputs.ig_version }}

          Please ensure these fields are filled in the issue and try again."
          gh issue edit ${{ steps.issue.outputs.issue_number }} --add-label "needs-manual-intervention" --remove-label "ready-for-automation"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.issue.outputs.branch_name }}"

      - name: Generate package JSON file
        run: |
          PACKAGE_FILE="module-config/packages/${{ steps.issue.outputs.package_file_name }}"

          # Determine package ID - use provided or generate from IG name
          PACKAGE_ID="${{ steps.issue.outputs.package_id }}"
          if [ -z "$PACKAGE_ID" ]; then
            # Generate a plausible package ID if not provided
            PACKAGE_ID="hl7.fhir.${{ steps.issue.outputs.safe_name }}"
            echo "⚠️  No package ID provided, using generated: $PACKAGE_ID"
          fi

          # Get install mode and fetch dependencies from issue checkboxes
          INSTALL_MODE="${{ steps.issue.outputs.install_mode }}"
          FETCH_DEPS="${{ steps.issue.outputs.fetch_dependencies }}"

          # Create package JSON file with required fields
          cat > "$PACKAGE_FILE" <<EOF
          {
            "name": "$PACKAGE_ID",
            "version": "${{ steps.issue.outputs.ig_version }}",
            "installMode": "$INSTALL_MODE",
            "fetchDependencies": $FETCH_DEPS
          }
          EOF

          echo "✅ Created $PACKAGE_FILE"
          cat "$PACKAGE_FILE"

          # Validate JSON
          jq empty "$PACKAGE_FILE"

      - name: Update simplified-multinode.yaml for selected nodes
        run: |
          SELECTED_NODES="${{ steps.issue.outputs.selected_nodes }}"
          PACKAGE_FILE_NAME="${{ steps.issue.outputs.package_file_name }}"

          echo "Updating simplified-multinode.yaml for nodes: $SELECTED_NODES"

          # Use the helper script to add package to selected nodes
          python scripts/update_node_packages.py \
            --action add \
            --nodes "$SELECTED_NODES" \
            --package "$PACKAGE_FILE_NAME"

          echo "✅ Updated simplified-multinode.yaml"

      - name: Update main.tf
        run: |
          PACKAGE_FILE_NAME="${{ steps.issue.outputs.package_file_name }}"

          # Check if this is an update (package already referenced) or new
          if grep -q "module-config/packages/$PACKAGE_FILE_NAME" main.tf; then
            echo "ℹ️  Package already referenced in main.tf (update scenario)"
            # For updates, we might need to change version only
            # This is handled by the new file creation above
          else
            echo "✅ Adding new package reference to main.tf"

            # Use Python to safely insert the entry, passing filename as env var
            PACKAGE_FILE_NAME="$PACKAGE_FILE_NAME" python3 <<'PYTHON_SCRIPT'
          import re
          import os

          package_file_name = os.environ['PACKAGE_FILE_NAME']

          with open('main.tf', 'r') as f:
              content = f.read()

          # Find the helm_chart_mapped_files section
          pattern = r'(helm_chart_mapped_files\s*=\s*\[)(.*?)(\s+# Users configuration)'

          def replacer(match):
              before = match.group(1)
              packages = match.group(2)
              after = match.group(3)

              new_entry = f"""
              {{
                name     = "{package_file_name}"
                location = "classes/config_seeding"
                data     = file("module-config/packages/{package_file_name}")
              }},"""

              return before + packages + new_entry + after

          new_content = re.sub(pattern, replacer, content, flags=re.DOTALL)

          with open('main.tf', 'w') as f:
              f.write(new_content)

          print("✅ Updated main.tf with new package reference")
          PYTHON_SCRIPT
          fi

      - name: Commit changes
        run: |
          git add "module-config/packages/${{ steps.issue.outputs.package_file_name }}"
          git add "module-config/simplified-multinode.yaml"
          git add main.tf

          git commit -m "Add ${{ steps.issue.outputs.ig_name }} ${{ steps.issue.outputs.ig_version }}

          Auto-generated from issue #${{ steps.issue.outputs.issue_number }}

          Changes:
          - Created module-config/packages/${{ steps.issue.outputs.package_file_name }}
          - Updated simplified-multinode.yaml for nodes: ${{ steps.issue.outputs.selected_nodes }}
          - Updated main.tf to reference new package

          Implements: #${{ steps.issue.outputs.issue_number }}"

      - name: Push branch
        run: |
          git push origin "${{ steps.issue.outputs.branch_name }}"

      - name: Create Pull Request
        id: create_pr
        env:
          IG_NAME: ${{ steps.issue.outputs.ig_name }}
          IG_VERSION: ${{ steps.issue.outputs.ig_version }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue_number }}
          PACKAGE_ID: ${{ steps.issue.outputs.package_id }}
          REQUEST_TYPE: ${{ steps.issue.outputs.request_type }}
          PACKAGE_FILE_NAME: ${{ steps.issue.outputs.package_file_name }}
          BRANCH_NAME: ${{ steps.issue.outputs.branch_name }}
          SELECTED_NODES: ${{ steps.issue.outputs.selected_nodes }}
        uses: actions/github-script@v7
        with:
          script: |
            const igName = process.env.IG_NAME;
            const igVersion = process.env.IG_VERSION;
            const issueNumber = process.env.ISSUE_NUMBER;
            const packageId = process.env.PACKAGE_ID || 'Auto-generated';
            const requestType = process.env.REQUEST_TYPE;
            const packageFileName = process.env.PACKAGE_FILE_NAME;
            const branchName = process.env.BRANCH_NAME;
            const selectedNodes = process.env.SELECTED_NODES;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Add ${igName} ${igVersion} to ${selectedNodes} (Issue #${issueNumber})`,
              head: branchName,
              base: 'main',
              body: `## Auto-generated IG Release PR

            This PR was automatically generated from user request in issue #${issueNumber}.

            ### User Request Summary
            - **IG Name**: ${igName}
            - **Version**: ${igVersion}
            - **Package ID**: ${packageId}
            - **Request Type**: ${requestType}
            - **Requested Nodes**: ${selectedNodes}

            ### Changes Made (Auto-generated)
            - ✅ Created \`module-config/packages/${packageFileName}\`
            - ✅ Updated \`simplified-multinode.yaml\` for nodes: ${selectedNodes}
            - ✅ Updated \`main.tf\` to reference new package

            ### Admin Review Checklist
            Please verify before approving:
            - [ ] Package ID is correct (auto-detected, may need correction)
            - [ ] Version is correct
            - [ ] Target nodes match user requirements: ${selectedNodes}
            - [ ] installMode is appropriate
            - [ ] fetchDependencies setting is appropriate
            - [ ] Business justification is acceptable
            - [ ] Acceptance criteria are clear
            - [ ] Terraform plan looks good

            ### Post-Merge Actions
            After merging this PR:
            1. **Deployment** will be triggered (if requested) or scheduled
            2. **Requester will be notified** about deployment
            3. **Requester will verify** deployment meets acceptance criteria
            4. **Issue will be closed** once verified

            ### Rollback Plan
            If issues occur after merge:
            1. Revert this PR
            2. Run terraform apply
            3. Update issue #${issueNumber} with rollback status

            ---
            Related to #${issueNumber}

            > **Note**: This issue will remain open for verification after deployment. Please do not close manually.

            🤖 This PR was automatically generated by the [Auto-Generate IG Release workflow](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            `
            });

            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_url', pr.html_url);

            return pr;

      - name: Update issue with PR link
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue_number }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
          PR_URL: ${{ steps.create_pr.outputs.pr_url }}
          PACKAGE_FILE_NAME: ${{ steps.issue.outputs.package_file_name }}
          PACKAGE_ID: ${{ steps.issue.outputs.package_id }}
          IG_VERSION: ${{ steps.issue.outputs.ig_version }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            const prNumber = process.env.PR_NUMBER;
            const prUrl = process.env.PR_URL;
            const packageFileName = process.env.PACKAGE_FILE_NAME;
            const packageId = process.env.PACKAGE_ID || 'Auto-generated - please verify!';
            const igVersion = process.env.IG_VERSION;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🤖 **Your Request is Being Processed**

            A Pull Request has been automatically generated for your IG release request:

            **PR #${prNumber}**: ${prUrl}

            ### What was generated:
            - ✅ Package file: \`module-config/packages/${packageFileName}\`
            - ✅ Updated: \`simplified-multinode.yaml\` for requested nodes
            - ✅ Updated: \`main.tf\`

            ### Next Steps:
            1. **Repo admins will review** the generated configuration
            2. **Admins will verify** package ID and version are correct
            3. **Once approved and merged**, you'll be notified about deployment
            4. **You'll be asked to verify** the deployment meets your requirements

            ### Auto-detected Configuration:
            - Package ID: **${packageId}**
            - Version: **${igVersion}**

            If you notice any issues with the auto-detected values, please comment on the PR!
            `
            });

            // Update labels on the issue
            const issueLabels = ['auto-pr-created', 'status:in-progress'];
            const prLabels = ['auto-pr-created'];

            // Add deploy-immediately label if checked
            const deployImmediately = '${{ steps.issue.outputs.deploy_immediately }}' === 'true';
            if (deployImmediately) {
              issueLabels.push('deploy-immediately');
              prLabels.push('deploy-immediately');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: issueLabels
            });

            // Also add label to the PR so post-merge workflow can detect it
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: prLabels
            });

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              name: 'ready-for-automation'
            }).catch(() => {});

      - name: Handle failure
        if: failure()
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue_number }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `❌ **Automated PR Generation Failed**

            The automation encountered an error while trying to generate the PR.

            **Error details**: Check the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.

            **Next steps**:
            - A maintainer will review this issue manually
            - The PR will be created manually instead

            This issue has been labeled \`needs-manual-intervention\`.
            `
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-manual-intervention']
            });

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              name: 'ready-for-automation'
            }).catch(() => {});
