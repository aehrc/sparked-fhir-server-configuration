name: 'Smile CDR Configuration Deployment'

on:
  pull_request:
    paths:
      - 'module-config/**'
      - 'main.tf'
      - '**.tf'
  push:
    branches:
      - main
    paths:
      - 'module-config/**'
      - 'main.tf'
      - '**.tf'
  workflow_dispatch: # Manual trigger

jobs:
  terraform-plan:
    uses: aehrc/sparked-infrastructure/.github/workflows/template-terraform-plan.yml@main
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    with:
      working_dir: "."
      aws_oidc_role: arn:aws:iam::471112546300:role/github-actions-eks-role
      aws_region: ap-southeast-2

  terraform-apply:
    uses: aehrc/sparked-infrastructure/.github/workflows/template-terraform-apply.yml@main
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    needs: [terraform-plan]
    # Only apply on main branch pushes when there are changes (exitcode == 2)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.terraform-plan.outputs.tfplanExitCode == '2'
    with:
      working_dir: "."
      aws_oidc_role: arn:aws:iam::471112546300:role/github-actions-eks-role
      aws_region: ap-southeast-2