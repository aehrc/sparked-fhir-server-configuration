name: Validate Configuration

on:
  pull_request:
    paths:
      - 'module-config/**'
      # - 'main.tf'
      # - '**.tf'
  push:
    branches:
      - main
    paths:
      - 'module-config/**'
      # - 'main.tf'
      # - '**.tf'

jobs:
  validate-yaml:
    name: Validate YAML Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML files
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 200}, indentation: {spaces: 2}}}" module-config/*.yaml || true
          echo "✅ YAML syntax validation complete"

      - name: Check for common issues
        run: |
          echo "Checking for common configuration issues..."

          # Check if package files referenced in main.tf exist
          echo "📦 Verifying package file references..."
          grep -o 'module-config/packages/[^"]*' main.tf | while read filepath; do
            if [ -f "$filepath" ]; then
              echo "  ✅ Found: $filepath"
            else
              echo "  ❌ Missing: $filepath"
              exit 1
            fi
          done

