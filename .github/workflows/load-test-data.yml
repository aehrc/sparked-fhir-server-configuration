name: Load Test Data

on:
  workflow_dispatch:
    inputs:
      upload_method:
        description: "Upload method: 'direct' (PUT to FHIR server) or 'fhirflare' (via FHIRFlare proxy)"
        required: true
        type: choice
        default: "direct"
        options:
          - direct
          - fhirflare
      target_node:
        description: "Target FHIR server node"
        required: true
        type: choice
        default: "aucore"
        options:
          - aucore
          - hl7au
          - ereq
          - custom
      custom_fhir_url:
        description: "Custom FHIR server URL (only when target_node=custom)"
        required: false
        type: string
      data_source:
        description: "Test data Git repository URL"
        required: false
        default: "https://github.com/hl7au/au-fhir-test-data"
        type: string
      data_folder:
        description: "Folder within repo containing test data"
        required: false
        default: "au-fhir-test-data-set"
        type: string
      upload_mode:
        description: "Upload mode (fhirflare method only)"
        required: false
        type: choice
        default: "individual"
        options:
          - individual
          - bundle
          - transaction
      batch_size:
        description: "Number of files per batch"
        required: false
        default: "50"
        type: string
      exclude_patterns:
        description: "Comma-separated directory patterns to exclude"
        required: false
        default: "vendor-demonstrator"
        type: string
      dry_run:
        description: "Dry run (parse files but do not upload)"
        required: false
        default: false
        type: boolean
      continue_on_error:
        description: "Continue uploading after errors"
        required: false
        default: true
        type: boolean
      issue_number:
        description: "Issue number to post results to (optional)"
        required: false
        type: number

  workflow_call:
    inputs:
      upload_method:
        required: true
        type: string
        default: "direct"
      target_node:
        required: true
        type: string
        default: "aucore"
      custom_fhir_url:
        required: false
        type: string
      data_source:
        required: false
        type: string
        default: "https://github.com/hl7au/au-fhir-test-data"
      data_folder:
        required: false
        type: string
        default: "au-fhir-test-data-set"
      upload_mode:
        required: false
        type: string
        default: "individual"
      batch_size:
        required: false
        type: string
        default: "50"
      exclude_patterns:
        required: false
        type: string
        default: "vendor-demonstrator"
      dry_run:
        required: false
        type: boolean
        default: false
      continue_on_error:
        required: false
        type: boolean
        default: true
      issue_number:
        required: false
        type: number
    secrets:
      CSIRO_FHIR_AUTH_64:
        required: false
      FHIRFLARE_API_KEY:
        required: false
      FHIRFLARE_URL:
        required: false
      FHIR_USERNAME:
        required: false
      FHIR_PASSWORD:
        required: false

permissions:
  contents: read
  issues: write

jobs:
  load-data:
    name: Load FHIR Test Data
    runs-on: arc-runner-set
    container:
      image: 471112546300.dkr.ecr.ap-southeast-2.amazonaws.com/sparked-test-data-loader:latest

    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          UPLOAD_METHOD="${{ inputs.upload_method || 'direct' }}"
          TARGET_NODE="${{ inputs.target_node || 'aucore' }}"
          CUSTOM_FHIR_URL="${{ inputs.custom_fhir_url }}"
          DATA_SOURCE="${{ inputs.data_source || 'https://github.com/hl7au/au-fhir-test-data' }}"
          DATA_FOLDER="${{ inputs.data_folder || 'au-fhir-test-data-set' }}"
          UPLOAD_MODE="${{ inputs.upload_mode || 'individual' }}"
          BATCH_SIZE="${{ inputs.batch_size || '50' }}"
          EXCLUDE="${{ inputs.exclude_patterns || 'vendor-demonstrator' }}"
          DRY_RUN="${{ inputs.dry_run }}"
          CONTINUE_ON_ERROR="${{ inputs.continue_on_error }}"
          ISSUE_NUMBER="${{ inputs.issue_number }}"

          # Resolve FHIR URL from node name
          case "$TARGET_NODE" in
            aucore) FHIR_URL="https://smile.sparked-fhir.com/aucore/fhir/DEFAULT" ;;
            hl7au)  FHIR_URL="https://smile.sparked-fhir.com/hl7au/fhir/DEFAULT" ;;
            ereq)   FHIR_URL="https://smile.sparked-fhir.com/ereq/fhir/DEFAULT" ;;
            custom) FHIR_URL="$CUSTOM_FHIR_URL" ;;
            *)      echo "::error::Unknown target node: $TARGET_NODE"; exit 1 ;;
          esac

          if [ -z "$FHIR_URL" ]; then
            echo "::error::FHIR URL is empty. If target_node=custom, provide custom_fhir_url."
            exit 1
          fi

          echo "upload_method=$UPLOAD_METHOD" >> $GITHUB_OUTPUT
          echo "fhir_url=$FHIR_URL" >> $GITHUB_OUTPUT
          echo "target_node=$TARGET_NODE" >> $GITHUB_OUTPUT
          echo "data_source=$DATA_SOURCE" >> $GITHUB_OUTPUT
          echo "data_folder=$DATA_FOLDER" >> $GITHUB_OUTPUT
          echo "upload_mode=$UPLOAD_MODE" >> $GITHUB_OUTPUT
          echo "batch_size=$BATCH_SIZE" >> $GITHUB_OUTPUT
          echo "exclude_patterns=$EXCLUDE" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT
          echo "continue_on_error=$CONTINUE_ON_ERROR" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

      - name: Comment on issue - Starting
        if: steps.inputs.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.inputs.outputs.issue_number }}'),
              body: `## Test Data Load Starting

            **Details:**
            - Upload Method: \`${{ steps.inputs.outputs.upload_method }}\`
            - Target: \`${{ steps.inputs.outputs.fhir_url }}\`
            - Data Source: \`${{ steps.inputs.outputs.data_source }}\`
            - Upload Mode: \`${{ steps.inputs.outputs.upload_mode }}\`
            - Dry Run: \`${{ steps.inputs.outputs.dry_run }}\`
            - Workflow Run: [View Progress](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            This may take several minutes depending on the data volume.`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.inputs.outputs.issue_number }}'),
              labels: ['in-progress']
            });

      - name: Clone test data repository
        id: clone
        run: |
          WORK_DIR="/tmp/fhir-data"
          mkdir -p "$WORK_DIR"
          git clone "${{ steps.inputs.outputs.data_source }}" "$WORK_DIR"

          DATA_DIR="$WORK_DIR/${{ steps.inputs.outputs.data_folder }}"
          if [ ! -d "$DATA_DIR" ]; then
            echo "::error::Data folder not found: $DATA_DIR"
            echo "Available contents:"
            ls -la "$WORK_DIR"
            exit 1
          fi

          TOTAL_FILES=$(find "$DATA_DIR" -name "*.json" -type f | wc -l)
          echo "Found $TOTAL_FILES JSON files in $DATA_DIR"
          echo "data_dir=$DATA_DIR" >> $GITHUB_OUTPUT
          echo "total_files=$TOTAL_FILES" >> $GITHUB_OUTPUT

      - name: Upload test data
        id: upload
        env:
          FHIR_AUTH_HEADER: ${{ secrets.CSIRO_FHIR_AUTH_64 }}
          FHIRFLARE_URL: ${{ secrets.FHIRFLARE_URL }}
          FHIRFLARE_API_KEY: ${{ secrets.FHIRFLARE_API_KEY }}
          FHIR_USERNAME: ${{ secrets.FHIR_USERNAME }}
          FHIR_PASSWORD: ${{ secrets.FHIR_PASSWORD }}
        run: |
          ARGS="--method ${{ steps.inputs.outputs.upload_method }}"
          ARGS="$ARGS --fhir-url ${{ steps.inputs.outputs.fhir_url }}"
          ARGS="$ARGS --data-dir ${{ steps.clone.outputs.data_dir }}"
          ARGS="$ARGS --upload-mode ${{ steps.inputs.outputs.upload_mode }}"
          ARGS="$ARGS --batch-size ${{ steps.inputs.outputs.batch_size }}"
          ARGS="$ARGS --exclude-patterns ${{ steps.inputs.outputs.exclude_patterns }}"
          ARGS="$ARGS --summary-file /tmp/upload-summary.json"
          ARGS="$ARGS --github-step-summary $GITHUB_STEP_SUMMARY"

          if [ "${{ steps.inputs.outputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          if [ "${{ steps.inputs.outputs.continue_on_error }}" != "true" ]; then
            ARGS="$ARGS --fail-on-error"
          fi

          set +e
          sparked-test-data-loader load $ARGS
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

          # Read summary as single-line JSON for output
          if [ -f /tmp/upload-summary.json ]; then
            DELIMITER="SUMMARY_$(date +%s%N)"
            echo "summary<<${DELIMITER}" >> $GITHUB_OUTPUT
            cat /tmp/upload-summary.json | tr -d '\n' >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "${DELIMITER}" >> $GITHUB_OUTPUT
          fi

          exit $EXIT_CODE

      - name: Post results to issue - Success
        if: always() && steps.inputs.outputs.issue_number != '' && steps.upload.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.inputs.outputs.issue_number }}');
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let summaryText = '';
            try {
              const summary = JSON.parse(`${{ steps.upload.outputs.summary }}`);
              summaryText = `- Total Files: ${summary.total}
            - Succeeded: ${summary.succeeded}
            - Failed: ${summary.failed}
            - Duration: ${summary.duration_seconds}s`;
            } catch (e) {
              summaryText = '- See workflow logs for details';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## Test Data Load Complete

            The test data has been successfully loaded.

            **Results:**
            ${summaryText}

            - Workflow Run: [View Logs](${runUrl})

            Please verify the data has been loaded as expected.`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['complete']
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'in-progress'
              });
            } catch (e) {}

      - name: Post results to issue - Failure
        if: always() && steps.inputs.outputs.issue_number != '' && steps.upload.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.inputs.outputs.issue_number }}');
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            let errorDetails = '';
            try {
              const summary = JSON.parse(`${{ steps.upload.outputs.summary }}`);
              errorDetails = `- Total Files: ${summary.total}
            - Succeeded: ${summary.succeeded}
            - Failed: ${summary.failed}
            - Duration: ${summary.duration_seconds}s`;
              if (summary.errors && summary.errors.length > 0) {
                errorDetails += '\n\n**First errors:**\n';
                for (const err of summary.errors.slice(0, 5)) {
                  errorDetails += `- \`${err.file}\`: ${err.status_code || 'N/A'} - ${err.error?.substring(0, 100) || 'Unknown'}\n`;
                }
              }
            } catch (e) {
              errorDetails = '- See workflow logs for details';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## Test Data Load Failed

            The test data loading operation encountered errors.

            **Results:**
            ${errorDetails}

            - Workflow Run: [View Logs](${runUrl})

            Please review the errors and try again, or contact the infrastructure team.`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['blocked']
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'in-progress'
              });
            } catch (e) {}
