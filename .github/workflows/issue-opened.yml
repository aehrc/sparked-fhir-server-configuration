name: Issue Opened / Edited

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to validate'
        required: true
        type: number
      job_type:
        description: 'Which validation to run'
        required: true
        type: choice
        options:
          - validate-ig
          - validate-tx

permissions:
  contents: read
  issues: write

jobs:
  # ============================================================================
  # JOB: Auto-label priority and post welcome message for new issues
  # ============================================================================
  welcome:
    name: Welcome & Auto-label
    runs-on: arc-runner-set
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - name: Auto-label priority and post welcome
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // --- Priority auto-labeling ---
            if (body.includes('Critical - Blocking work')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: ['priority:critical']
              });
            } else if (body.includes('High - Needed within 1 week')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: ['priority:high']
              });
            } else if (body.includes('Medium - Needed within 2 weeks')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, labels: ['priority:medium']
              });
            }

            // --- Welcome message based on issue type ---
            const issueType = issue.labels
              .map(l => l.name)
              .find(name => ['ig-release', 'configuration', 'operations', 'tx-content'].includes(name));

            let message = '👋 Thank you for your request!\n\n';

            if (issueType === 'ig-release') {
              message += '## Next Steps for IG Release\n\n';
              message += '1. ✅ **Request received** - Your request is now in the queue\n';
              message += '2. 🔍 **Validation** - Automated validation will run within 1 minute\n';
              message += '3. 📋 **Admin review** - Team will review and approve if validation passes\n';
              message += '4. 🤖 **PR auto-creation** - A pull request will be automatically generated\n';
              message += '5. 🚀 **Deployment** - After PR merge, deployment will occur (immediate or scheduled)\n';
              message += '6. ✅ **Verification** - You\'ll be asked to verify the deployment\n';
              message += '7. 🎉 **Complete** - You can close the issue after verification\n\n';
              message += '**Watch this issue for status updates** - Labels will change as work progresses.\n\n';
              message += 'Questions? Comment below and the team will respond.';
            } else if (issueType === 'configuration') {
              message += '## Next Steps for Configuration Change\n\n';
              message += '1. ✅ **Request received**\n';
              message += '2. 🔍 **Impact assessment** - Team will evaluate the change and potential impacts\n';
              message += '3. 📋 **ADR approval** (if needed) - Major changes require Architecture Decision Record\n';
              message += '4. 🚀 **Implementation** - Changes will be made and tested\n';
              message += '5. ✅ **Verification** - You\'ll be asked to verify the change meets requirements\n';
              message += '6. 📣 **Notification** - Stakeholders notified on Zulip\n\n';
              message += '**Labels indicate status** - Watch for label changes as work progresses.';
            } else if (issueType === 'operations') {
              message += '## Next Steps for Operational Request\n\n';
              message += '1. ✅ **Request received**\n';
              message += '2. 🔍 **Safety review** - Team will verify scope and safety checks\n';
              message += '3. 📅 **Scheduling** - Operation will be scheduled based on urgency and constraints\n';
              message += '4. ⚠️  **Pre-execution notice** - You\'ll be notified before the operation runs\n';
              message += '5. ▶️  **Execution** - Operation will be performed with monitoring\n';
              message += '6. ✅ **Verification** - Results verified against your verification plan\n';
              message += '7. 📣 **Completion notice** - Notification sent on Zulip\n\n';
              message += '**For destructive operations** (expunge/delete), additional approval may be required.';
            } else if (issueType === 'tx-content') {
              message += '## Next Steps for Terminology Server Content Change\n\n';
              message += '1. **Request received** - Your request is now in the queue\n';
              message += '2. **Validation** - Automated validation and dry-run preview will run within 1 minute\n';
              message += '3. **Admin review** - Team will review and approve if validation passes\n';
              message += '4. **PR auto-creation** - A pull request will be automatically generated\n';
              message += '5. **Merge & deploy** - After PR merge, the atomio-ig-feeder will pick up the change on the next sync cycle\n';
              message += '6. **Verification** - You\'ll be asked to verify the content change took effect\n\n';
              message += '**Watch this issue for status updates** - Labels will change as work progresses.\n\n';
              message += 'Questions? Comment below and the team will respond.';
            } else {
              message += 'A team member will review your request shortly and provide next steps.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: message
            });

  # ============================================================================
  # JOB: Validate IG release requests
  # ============================================================================
  validate-ig:
    name: Validate IG Request
    runs-on: arc-runner-set
    container:
      image: python:3.12-slim
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ig-release')) ||
      (github.event_name == 'workflow_dispatch' && inputs.job_type == 'validate-ig')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Parse issue details
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue?.number || parseInt('${{ inputs.issue_number }}') || null;
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            const body = issue.body || '';

            const extractField = (label) => {
              const regex = new RegExp(`### ${label}\\s*([\\s\\S]*?)(?=###|$)`, 'i');
              const match = body.match(regex);
              const value = match ? match[1].trim() : '';
              return value === '_No response_' ? '' : value;
            };

            const igName = extractField('Implementation Guide Name');
            const igVersion = extractField('IG Version');
            const packageId = extractField('NPM Package ID') || '';

            // Extract target nodes from checkboxes
            const targetNodesSection = extractField('Target SmileCDR Nodes');
            const selectedNodes = [];

            if (targetNodesSection.includes('[x]') || targetNodesSection.includes('[X]')) {
              const lines = targetNodesSection.split('\n');
              for (const line of lines) {
                if (line.includes('[x]') || line.includes('[X]')) {
                  if (line.includes('aucore')) selectedNodes.push('aucore');
                  if (line.includes('hl7au')) selectedNodes.push('hl7au');
                  if (line.includes('ereq')) selectedNodes.push('ereq');
                }
              }
            }

            // Extract package options
            const packageOptions = extractField('Package Installation Options');
            const lines = packageOptions.split('\n');

            const installModeChecked = lines.length > 0 && (lines[0].includes('[X]') || lines[0].includes('[x]'));
            const installMode = installModeChecked ? 'STORE_AND_INSTALL' : 'STORE_ONLY';

            const fetchDepsChecked = lines.length > 1 && (lines[1].includes('[X]') || lines[1].includes('[x]'));

            const safeName = igName.toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '');

            const packageFileName = `package-${safeName}-${igVersion}.json`;

            let finalPackageId = packageId;
            if (!finalPackageId) {
              finalPackageId = `hl7.fhir.${safeName}`;
            }

            core.setOutput('issue_number', issueNumber);
            core.setOutput('ig_name', igName);
            core.setOutput('ig_version', igVersion);
            core.setOutput('package_id', finalPackageId);
            core.setOutput('package_id_provided', packageId ? 'true' : 'false');
            core.setOutput('install_mode', installMode);
            core.setOutput('fetch_dependencies', fetchDepsChecked);
            core.setOutput('package_file_name', packageFileName);
            core.setOutput('selected_nodes', selectedNodes.join(','));
            core.setOutput('selected_nodes_count', selectedNodes.length);

      - name: Validate required fields
        id: validate
        run: |
          IG_NAME="${{ steps.parse.outputs.ig_name }}"
          IG_VERSION="${{ steps.parse.outputs.ig_version }}"
          NODES_COUNT="${{ steps.parse.outputs.selected_nodes_count }}"

          ERRORS=""

          if [ -z "$IG_NAME" ]; then
            ERRORS="${ERRORS}- IG Name is required\n"
          fi

          if [ -z "$IG_VERSION" ]; then
            ERRORS="${ERRORS}- IG Version is required\n"
          fi

          if [ "$NODES_COUNT" = "0" ]; then
            ERRORS="${ERRORS}- At least one target node must be selected\n"
          fi

          if [ -n "$ERRORS" ]; then
            echo "validation_passed=false" >> $GITHUB_OUTPUT
            echo -e "$ERRORS" > validation_errors.txt
          else
            echo "validation_passed=true" >> $GITHUB_OUTPUT
            echo "All required fields present" > validation_errors.txt
          fi

      - name: Run dry-run preview
        if: steps.validate.outputs.validation_passed == 'true'
        id: dryrun
        env:
          SMILECDR_BASE_URL: https://smile.sparked-fhir.com
          SMILECDR_AUTH_BASIC: ${{ secrets.CSIRO_FHIR_AUTH_64 }}
        run: |
          NODES="${{ steps.parse.outputs.selected_nodes }}"
          PACKAGE_NAME="${{ steps.parse.outputs.package_id }}"
          PACKAGE_VERSION="${{ steps.parse.outputs.ig_version }}"

          echo "Running dry-run for package: $PACKAGE_NAME@$PACKAGE_VERSION"
          echo "Target nodes: $NODES"

          CUSTOM_PACKAGE=$(cat <<EOF
          [{"name": "$PACKAGE_NAME", "version": "$PACKAGE_VERSION", "installMode": "${{ steps.parse.outputs.install_mode }}", "fetchDependencies": ${{ steps.parse.outputs.fetch_dependencies }}}]
          EOF
          )

          python scripts/sync_packages.py \
            --nodes "$NODES" \
            --source custom \
            --packages "$CUSTOM_PACKAGE" \
            --dry-run \
            2>&1 | tee dryrun_output.txt

          EXIT_CODE=${PIPESTATUS[0]}
          echo "dryrun_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Generate preview comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueNumber = ${{ steps.parse.outputs.issue_number }};
            const validationPassed = '${{ steps.validate.outputs.validation_passed }}' === 'true';
            const dryrunExitCode = '${{ steps.dryrun.outputs.dryrun_exit_code }}' || '';

            let comment = '## Automated Validation & Preview\n\n';

            if (!validationPassed) {
              comment += '### Validation Failed\n\n';
              comment += 'Please fix the following issues:\n\n';
              const errors = fs.readFileSync('validation_errors.txt', 'utf8');
              comment += errors;
              comment += '\n\n---\n';
              comment += 'Update the issue with the required information and the validation will run again automatically.\n';
            } else {
              comment += '### Validation Passed\n\n';
              comment += '**IG Details:**\n';
              comment += `- **Name**: ${{ steps.parse.outputs.ig_name }}\n`;
              comment += `- **Version**: ${{ steps.parse.outputs.ig_version }}\n`;
              comment += `- **Package ID**: ${{ steps.parse.outputs.package_id }}`;

              if ('${{ steps.parse.outputs.package_id_provided }}' === 'false') {
                comment += ' *(auto-generated - please verify)*';
              }
              comment += '\n';
              comment += `- **Install Mode**: ${{ steps.parse.outputs.install_mode }}\n`;
              comment += `- **Fetch Dependencies**: ${{ steps.parse.outputs.fetch_dependencies }}\n`;
              comment += `- **Target Nodes**: ${{ steps.parse.outputs.selected_nodes }}\n`;

              comment += '\n### Dry-Run Preview\n\n';

              if (dryrunExitCode === '0') {
                comment += '**Dry-run completed successfully!**\n\n';
              } else {
                comment += '**Dry-run encountered issues** (this may be expected if testing connectivity)\n\n';
              }

              comment += '<details>\n';
              comment += '<summary>Click to view detailed dry-run output</summary>\n\n';
              comment += '```\n';

              try {
                const dryrunOutput = fs.readFileSync('dryrun_output.txt', 'utf8');
                const maxLength = 50000;
                if (dryrunOutput.length > maxLength) {
                  comment += dryrunOutput.substring(0, maxLength);
                  comment += '\n\n... (output truncated due to length)\n';
                } else {
                  comment += dryrunOutput;
                }
              } catch (e) {
                comment += 'No dry-run output available\n';
              }

              comment += '```\n';
              comment += '</details>\n\n';

              comment += '---\n\n';
              comment += '### Next Steps\n\n';
              comment += 'If everything looks correct:\n\n';
              comment += '1. Review the dry-run output above\n';
              comment += '2. Verify the package ID is correct\n';
              comment += '3. Add the `ready-for-automation` label to trigger PR creation\n\n';
              comment += 'If changes are needed:\n\n';
              comment += '- Edit the issue to update fields\n';
              comment += '- Validation will run automatically after editing\n';
            }

            comment += '\n\n---\n';
            comment += `*Last validated: ${new Date().toISOString()}*`;

            // Find and delete previous validation comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            for (const prevComment of comments) {
              if (prevComment.user.type === 'Bot' &&
                  prevComment.body.includes('Automated Validation & Preview')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: prevComment.id
                });
              }
            }

            // Post new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            // Update labels based on validation
            if (validationPassed) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'needs-review'
                });
              } catch (e) {
                // Label might not exist
              }
            }

  # ============================================================================
  # JOB: Validate TX content requests
  # ============================================================================
  validate-tx:
    name: Validate TX Content Request
    runs-on: arc-runner-set
    container:
      image: python:3.12-slim
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'tx-content')) ||
      (github.event_name == 'workflow_dispatch' && inputs.job_type == 'validate-tx')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Parse issue details
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue?.number || parseInt('${{ inputs.issue_number }}') || null;
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            const body = issue.body || '';

            const extractField = (label) => {
              const regex = new RegExp(`### ${label}\\s*([\\s\\S]*?)(?=###|$)`, 'i');
              const match = body.match(regex);
              const value = match ? match[1].trim() : '';
              return value === '_No response_' ? '' : value;
            };

            const actionType = extractField('Action Type');
            const packageId = extractField('Package ID');
            const packageListUrl = extractField('Package List URL');
            const displayName = extractField('Display Name');
            const versionMode = extractField('Version Mode');
            const pinnedVersions = extractField('Pinned Versions');
            const feedName = extractField('Feed Name');
            const businessJustification = extractField('Business Justification');

            // Extract target servers from checkboxes
            const targetSection = extractField('Target Terminology Server');
            const selectedServers = [];
            if (targetSection.includes('[x]') || targetSection.includes('[X]')) {
              const lines = targetSection.split('\n');
              for (const line of lines) {
                if (line.includes('[x]') || line.includes('[X]')) {
                  if (line.includes('tx.dev')) selectedServers.push('tx-dev');
                  if (line.includes('tx.hl7')) selectedServers.push('tx-hl7');
                }
              }
            }

            // Extract statuses from checkboxes
            const statusSection = extractField('Release Statuses to Include');
            const selectedStatuses = [];
            if (statusSection) {
              const lines = statusSection.split('\n');
              for (const line of lines) {
                if (line.includes('[x]') || line.includes('[X]')) {
                  if (line.includes('trial-use')) selectedStatuses.push('trial-use');
                  else if (line.includes('ballot')) selectedStatuses.push('ballot');
                  else if (line.includes('preview')) selectedStatuses.push('preview');
                  else if (line.includes('draft')) selectedStatuses.push('draft');
                }
              }
            }

            // Determine CLI action name
            let cliAction = '';
            if (actionType.includes('Add')) cliAction = 'add-watch';
            else if (actionType.includes('Remove')) cliAction = 'remove-watch';
            else if (actionType.includes('Modify')) cliAction = 'modify-watch';

            const safeName = packageId.toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '');

            core.setOutput('issue_number', issueNumber);
            core.setOutput('action_type', actionType);
            core.setOutput('cli_action', cliAction);
            core.setOutput('package_id', packageId);
            core.setOutput('package_list_url', packageListUrl);
            core.setOutput('display_name', displayName);
            core.setOutput('version_mode', versionMode);
            core.setOutput('pinned_versions', pinnedVersions);
            core.setOutput('feed_name', feedName);
            core.setOutput('selected_servers', selectedServers.join(','));
            core.setOutput('selected_servers_count', selectedServers.length);
            core.setOutput('selected_statuses', selectedStatuses.join(','));
            core.setOutput('selected_statuses_count', selectedStatuses.length);
            core.setOutput('safe_name', safeName);
            core.setOutput('business_justification', businessJustification);

      - name: Validate required fields
        id: validate
        run: |
          ACTION_TYPE="${{ steps.parse.outputs.action_type }}"
          CLI_ACTION="${{ steps.parse.outputs.cli_action }}"
          PACKAGE_ID="${{ steps.parse.outputs.package_id }}"
          PACKAGE_LIST_URL="${{ steps.parse.outputs.package_list_url }}"
          SERVERS_COUNT="${{ steps.parse.outputs.selected_servers_count }}"
          STATUSES_COUNT="${{ steps.parse.outputs.selected_statuses_count }}"
          VERSION_MODE="${{ steps.parse.outputs.version_mode }}"
          PINNED_VERSIONS="${{ steps.parse.outputs.pinned_versions }}"
          BUSINESS_JUSTIFICATION="${{ steps.parse.outputs.business_justification }}"

          ERRORS=""

          if [ -z "$CLI_ACTION" ]; then
            ERRORS="${ERRORS}- Action Type is required\n"
          fi

          if [ -z "$PACKAGE_ID" ]; then
            ERRORS="${ERRORS}- Package ID is required\n"
          fi

          if [ "$SERVERS_COUNT" = "0" ]; then
            ERRORS="${ERRORS}- At least one target server must be selected\n"
          fi

          if [ "$CLI_ACTION" = "add-watch" ] && [ -z "$PACKAGE_LIST_URL" ]; then
            ERRORS="${ERRORS}- Package List URL is required when adding a new watch\n"
          fi

          if [ "$CLI_ACTION" = "add-watch" ] && [ "$STATUSES_COUNT" = "0" ]; then
            ERRORS="${ERRORS}- At least one release status must be selected when adding a watch\n"
          fi

          if [ "$VERSION_MODE" = "pinned" ] && [ -z "$PINNED_VERSIONS" ]; then
            ERRORS="${ERRORS}- Pinned Versions is required when Version Mode is 'pinned'\n"
          fi

          if [ -z "$BUSINESS_JUSTIFICATION" ]; then
            ERRORS="${ERRORS}- Business Justification is required\n"
          fi

          if [ -n "$ERRORS" ]; then
            echo "validation_passed=false" >> $GITHUB_OUTPUT
            echo -e "$ERRORS" > validation_errors.txt
          else
            echo "validation_passed=true" >> $GITHUB_OUTPUT
            echo "All required fields present" > validation_errors.txt
          fi

      - name: Run dry-run preview
        if: steps.validate.outputs.validation_passed == 'true'
        id: dryrun
        run: |
          SERVERS="${{ steps.parse.outputs.selected_servers }}"
          ACTION="${{ steps.parse.outputs.cli_action }}"
          PACKAGE_ID="${{ steps.parse.outputs.package_id }}"

          CMD="python scripts/update_tx_helm_values.py --action $ACTION --server $SERVERS --package-id $PACKAGE_ID --dry-run"

          PACKAGE_LIST_URL="${{ steps.parse.outputs.package_list_url }}"
          if [ -n "$PACKAGE_LIST_URL" ]; then
            CMD="$CMD --package-list-url $PACKAGE_LIST_URL"
          fi

          DISPLAY_NAME="${{ steps.parse.outputs.display_name }}"
          if [ -n "$DISPLAY_NAME" ]; then
            CMD="$CMD --display-name \"$DISPLAY_NAME\""
          fi

          STATUSES="${{ steps.parse.outputs.selected_statuses }}"
          if [ -n "$STATUSES" ]; then
            CMD="$CMD --statuses $STATUSES"
          fi

          VERSION_MODE="${{ steps.parse.outputs.version_mode }}"
          if [ -n "$VERSION_MODE" ]; then
            CMD="$CMD --version-mode $VERSION_MODE"
          fi

          PINNED_VERSIONS="${{ steps.parse.outputs.pinned_versions }}"
          if [ -n "$PINNED_VERSIONS" ]; then
            CLEANED_VERSIONS=$(echo "$PINNED_VERSIONS" | tr -d ' ')
            CMD="$CMD --versions $CLEANED_VERSIONS"
          fi

          FEED_NAME="${{ steps.parse.outputs.feed_name }}"
          if [ -n "$FEED_NAME" ]; then
            CMD="$CMD --feed-name $FEED_NAME"
          fi

          echo "Running: $CMD"
          eval "$CMD" 2>&1 | tee dryrun_output.txt

          EXIT_CODE=${PIPESTATUS[0]}
          echo "dryrun_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Generate preview comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueNumber = ${{ steps.parse.outputs.issue_number }};
            const validationPassed = '${{ steps.validate.outputs.validation_passed }}' === 'true';
            const dryrunExitCode = '${{ steps.dryrun.outputs.dryrun_exit_code }}' || '';

            let comment = '## Automated Validation & Preview\n\n';

            if (!validationPassed) {
              comment += '### Validation Failed\n\n';
              comment += 'Please fix the following issues:\n\n';
              const errors = fs.readFileSync('validation_errors.txt', 'utf8');
              comment += errors;
              comment += '\n\n---\n';
              comment += 'Edit the issue to fix these fields and validation will run again automatically.\n';
            } else {
              comment += '### Validation Passed\n\n';
              comment += '**Request Details:**\n';
              comment += `- **Action**: ${{ steps.parse.outputs.action_type }}\n`;
              comment += `- **Package ID**: ${{ steps.parse.outputs.package_id }}\n`;
              comment += `- **Target Servers**: ${{ steps.parse.outputs.selected_servers }}\n`;

              const packageListUrl = '${{ steps.parse.outputs.package_list_url }}';
              if (packageListUrl) {
                comment += `- **Package List URL**: ${packageListUrl}\n`;
              }

              const displayName = '${{ steps.parse.outputs.display_name }}';
              if (displayName) {
                comment += `- **Display Name**: ${displayName}\n`;
              }

              const statuses = '${{ steps.parse.outputs.selected_statuses }}';
              if (statuses) {
                comment += `- **Statuses**: ${statuses}\n`;
              }

              comment += `- **Version Mode**: ${{ steps.parse.outputs.version_mode }}\n`;

              const pinnedVersions = '${{ steps.parse.outputs.pinned_versions }}';
              if (pinnedVersions) {
                comment += `- **Pinned Versions**: ${pinnedVersions}\n`;
              }

              const feedName = '${{ steps.parse.outputs.feed_name }}';
              if (feedName) {
                comment += `- **Feed Name**: ${feedName}\n`;
              }

              comment += '\n### Dry-Run Preview\n\n';

              if (dryrunExitCode === '0') {
                comment += '**Dry-run completed successfully!**\n\n';
              } else {
                comment += '**Dry-run encountered issues** - review the output below.\n\n';
              }

              comment += '<details>\n';
              comment += '<summary>Click to view dry-run output</summary>\n\n';
              comment += '```\n';

              try {
                const dryrunOutput = fs.readFileSync('dryrun_output.txt', 'utf8');
                const maxLength = 50000;
                if (dryrunOutput.length > maxLength) {
                  comment += dryrunOutput.substring(0, maxLength);
                  comment += '\n\n... (output truncated)\n';
                } else {
                  comment += dryrunOutput;
                }
              } catch (e) {
                comment += 'No dry-run output available\n';
              }

              comment += '```\n';
              comment += '</details>\n\n';

              comment += '---\n\n';
              comment += '### Next Steps\n\n';
              comment += 'If everything looks correct:\n\n';
              comment += '1. Review the dry-run output above\n';
              comment += '2. Add the `ready-for-automation` label to trigger PR creation\n\n';
              comment += 'If changes are needed:\n\n';
              comment += '- Edit the issue to update fields\n';
              comment += '- Validation will run automatically after editing\n';
            }

            comment += '\n\n---\n';
            comment += `*Last validated: ${new Date().toISOString()}*`;

            // Find and delete previous validation comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            for (const prevComment of comments) {
              if (prevComment.user.type === 'Bot' &&
                  prevComment.body.includes('Automated Validation & Preview')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: prevComment.id
                });
              }
            }

            // Post new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            // Update labels based on validation
            if (validationPassed) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'needs-review'
                });
              } catch (e) {
                // Label might not exist
              }
            }
