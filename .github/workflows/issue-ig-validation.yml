name: IG Request Validation & Preview

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to validate'
        required: true
        type: number

permissions:
  contents: read
  issues: write

jobs:
  validate-and-preview:
    name: Validate IG Request and Generate Preview
    runs-on: ubuntu-latest
    # Only run for ig-release issues
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ig-release')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Parse issue details
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue?.number || parseInt('${{ inputs.issue_number }}') || null;
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            const body = issue.body || '';

            // Extract fields
            const extractField = (label) => {
              const regex = new RegExp(`### ${label}\\s*([\\s\\S]*?)(?=###|$)`, 'i');
              const match = body.match(regex);
              const value = match ? match[1].trim() : '';
              // Treat GitHub's "_No response_" as empty
              return value === '_No response_' ? '' : value;
            };

            const igName = extractField('Implementation Guide Name');
            const igVersion = extractField('IG Version');
            const packageId = extractField('NPM Package ID \\(if known\\)') || '';

            // Extract target nodes from checkboxes
            const targetNodesSection = extractField('Target SmileCDR Nodes');
            const selectedNodes = [];

            if (targetNodesSection.includes('[x]') || targetNodesSection.includes('[X]')) {
              const lines = targetNodesSection.split('\n');
              for (const line of lines) {
                if (line.includes('[x]') || line.includes('[X]')) {
                  if (line.includes('aucore')) selectedNodes.push('aucore');
                  if (line.includes('hl7au')) selectedNodes.push('hl7au');
                  if (line.includes('ereq')) selectedNodes.push('ereq');
                }
              }
            }

            // Extract package options
            const packageOptions = extractField('Package Installation Options');
            const lines = packageOptions.split('\n');

            // Check first checkbox for STORE_AND_INSTALL
            const installModeChecked = lines.length > 0 && (lines[0].includes('[X]') || lines[0].includes('[x]'));
            const installMode = installModeChecked ? 'STORE_AND_INSTALL' : 'STORE_ONLY';

            // Check second checkbox for fetch dependencies
            const fetchDepsChecked = lines.length > 1 && (lines[1].includes('[X]') || lines[1].includes('[x]'));

            // Generate safe filename
            const safeName = igName.toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '');

            const packageFileName = `package-${safeName}-${igVersion}.json`;

            // Determine final package ID
            let finalPackageId = packageId;
            if (!finalPackageId) {
              finalPackageId = `hl7.fhir.${safeName}`;
            }

            core.setOutput('issue_number', issueNumber);
            core.setOutput('ig_name', igName);
            core.setOutput('ig_version', igVersion);
            core.setOutput('package_id', finalPackageId);
            core.setOutput('package_id_provided', packageId ? 'true' : 'false');
            core.setOutput('install_mode', installMode);
            core.setOutput('fetch_dependencies', fetchDepsChecked);
            core.setOutput('package_file_name', packageFileName);
            core.setOutput('selected_nodes', selectedNodes.join(','));
            core.setOutput('selected_nodes_count', selectedNodes.length);

            return {
              issueNumber,
              igName,
              igVersion,
              packageId: finalPackageId,
              selectedNodes,
              installMode,
              fetchDependencies: fetchDepsChecked,
              packageFileName
            };

      - name: Validate required fields
        id: validate
        run: |
          IG_NAME="${{ steps.parse.outputs.ig_name }}"
          IG_VERSION="${{ steps.parse.outputs.ig_version }}"
          NODES_COUNT="${{ steps.parse.outputs.selected_nodes_count }}"

          ERRORS=""

          if [ -z "$IG_NAME" ]; then
            ERRORS="${ERRORS}- ❌ IG Name is required\n"
          fi

          if [ -z "$IG_VERSION" ]; then
            ERRORS="${ERRORS}- ❌ IG Version is required\n"
          fi

          if [ "$NODES_COUNT" = "0" ]; then
            ERRORS="${ERRORS}- ❌ At least one target node must be selected\n"
          fi

          if [ -n "$ERRORS" ]; then
            echo "validation_passed=false" >> $GITHUB_OUTPUT
            echo -e "$ERRORS" > validation_errors.txt
          else
            echo "validation_passed=true" >> $GITHUB_OUTPUT
            echo "✅ All required fields present" > validation_errors.txt
          fi

      - name: Run dry-run preview
        if: steps.validate.outputs.validation_passed == 'true'
        id: dryrun
        env:
          SMILECDR_BASE_URL: https://smile.sparked-fhir.com
          SMILECDR_AUTH_BASIC: ${{ secrets.CSIRO_FHIR_AUTH_64 }}
        run: |
          NODES="${{ steps.parse.outputs.selected_nodes }}"
          PACKAGE_NAME="${{ steps.parse.outputs.package_id }}"
          PACKAGE_VERSION="${{ steps.parse.outputs.ig_version }}"

          echo "Running dry-run for package: $PACKAGE_NAME@$PACKAGE_VERSION"
          echo "Target nodes: $NODES"

          # Create a temporary custom package spec for dry-run
          CUSTOM_PACKAGE=$(cat <<EOF
          [{
            "name": "$PACKAGE_NAME",
            "version": "$PACKAGE_VERSION",
            "installMode": "${{ steps.parse.outputs.install_mode }}",
            "fetchDependencies": ${{ steps.parse.outputs.fetch_dependencies }}
          }]
          EOF
          )

          # Run sync_packages.py in dry-run mode with custom package
          python scripts/sync_packages.py \
            --nodes "$NODES" \
            --source custom \
            --packages "$CUSTOM_PACKAGE" \
            --dry-run \
            2>&1 | tee dryrun_output.txt

          # Capture exit code
          EXIT_CODE=${PIPESTATUS[0]}
          echo "dryrun_exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Generate preview comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueNumber = ${{ steps.parse.outputs.issue_number }};
            const validationPassed = '${{ steps.validate.outputs.validation_passed }}' === 'true';
            const dryrunExitCode = '${{ steps.dryrun.outputs.dryrun_exit_code }}' || '';

            let comment = '## 🔍 Automated Validation & Preview\n\n';

            if (!validationPassed) {
              comment += '### ❌ Validation Failed\n\n';
              comment += 'Please fix the following issues:\n\n';
              const errors = fs.readFileSync('validation_errors.txt', 'utf8');
              comment += errors;
              comment += '\n\n---\n';
              comment += '💡 **Next Steps**: Update the issue with the required information and the validation will run again automatically.\n';
            } else {
              comment += '### ✅ Validation Passed\n\n';
              comment += '**IG Details:**\n';
              comment += `- **Name**: ${{ steps.parse.outputs.ig_name }}\n`;
              comment += `- **Version**: ${{ steps.parse.outputs.ig_version }}\n`;
              comment += `- **Package ID**: ${{ steps.parse.outputs.package_id }}`;

              if ('${{ steps.parse.outputs.package_id_provided }}' === 'false') {
                comment += ' ⚠️ *(auto-generated - please verify)*';
              }
              comment += '\n';
              comment += `- **Install Mode**: ${{ steps.parse.outputs.install_mode }}\n`;
              comment += `- **Fetch Dependencies**: ${{ steps.parse.outputs.fetch_dependencies }}\n`;
              comment += `- **Target Nodes**: ${{ steps.parse.outputs.selected_nodes }}\n`;

              comment += '\n### 📦 Dry-Run Preview\n\n';

              if (dryrunExitCode === '0') {
                comment += '✅ **Dry-run completed successfully!**\n\n';
              } else {
                comment += '⚠️ **Dry-run encountered issues** (this may be expected if testing connectivity)\n\n';
              }

              comment += '<details>\n';
              comment += '<summary>Click to view detailed dry-run output</summary>\n\n';
              comment += '```\n';

              try {
                const dryrunOutput = fs.readFileSync('dryrun_output.txt', 'utf8');
                // Truncate if too long (GitHub comment limit)
                const maxLength = 50000;
                if (dryrunOutput.length > maxLength) {
                  comment += dryrunOutput.substring(0, maxLength);
                  comment += '\n\n... (output truncated due to length)\n';
                } else {
                  comment += dryrunOutput;
                }
              } catch (e) {
                comment += 'No dry-run output available\n';
              }

              comment += '```\n';
              comment += '</details>\n\n';

              comment += '---\n\n';
              comment += '### 📋 Next Steps\n\n';
              comment += 'If everything looks correct:\n\n';
              comment += '1. ✅ Review the dry-run output above\n';
              comment += '2. ✅ Verify the package ID is correct\n';
              comment += '3. ✅ Add the `ready-for-automation` label to trigger PR creation\n\n';
              comment += 'If changes are needed:\n\n';
              comment += '- ✏️ Edit the issue to update fields\n';
              comment += '- 🔄 Validation will run automatically after editing\n';
            }

            comment += '\n\n---\n';
            comment += `*Last validated: ${new Date().toISOString()}*`;

            // Find and delete previous validation comments
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            for (const prevComment of comments) {
              if (prevComment.user.type === 'Bot' &&
                  prevComment.body.includes('🔍 Automated Validation & Preview')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: prevComment.id
                });
              }
            }

            // Post new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            // Update labels based on validation
            if (validationPassed) {
              // Remove needs-review if present, keep others
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'needs-review'
                });
              } catch (e) {
                // Label might not exist
              }
            } else {
              // Add needs-revision label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['needs-revision']
              });
            }
