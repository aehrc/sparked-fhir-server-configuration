name: Post-Merge IG Deployment

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  deployment-options:
    name: Post Deployment Options
    runs-on: ubuntu-latest
    # Only run if PR was merged and has the auto-pr-created label
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'auto-pr-created')

    steps:
      - name: Extract issue number from PR body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';

            // Extract issue number from "Closes #123" or "Issue #123"
            const issueMatch = prBody.match(/#(\d+)/);
            const issueNumber = issueMatch ? issueMatch[1] : null;

            core.setOutput('issue_number', issueNumber);

            return { issueNumber };

      - name: Check if deploy-immediately label is present
        id: check_deploy
        if: steps.extract.outputs.issue_number
        run: |
          # Check if PR has deploy-immediately label
          HAS_DEPLOY_LABEL="${{ contains(github.event.pull_request.labels.*.name, 'deploy-immediately') }}"
          echo "has_deploy_label=$HAS_DEPLOY_LABEL" >> $GITHUB_OUTPUT

      - name: Extract target nodes from PR
        id: extract_nodes
        if: steps.extract.outputs.issue_number && steps.check_deploy.outputs.has_deploy_label == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';

            // Extract nodes from PR body (look for "Target Nodes: aucore,hl7au")
            const nodesMatch = prBody.match(/\*\*Target Nodes\*\*[:\s]+([^\n]+)/i);
            let nodes = 'all';  // Default to all

            if (nodesMatch) {
              nodes = nodesMatch[1].trim().replace(/\*\*/g, '').replace(/`/g, '');
            }

            core.setOutput('nodes', nodes);
            return { nodes };

      - name: Trigger deployment workflow
        if: steps.extract.outputs.issue_number && steps.check_deploy.outputs.has_deploy_label == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.extract.outputs.issue_number }}');
            const nodes = '${{ steps.extract_nodes.outputs.nodes }}';
            const prNumber = context.payload.pull_request.number;

            console.log(`Triggering deployment for issue #${issueNumber} with nodes: ${nodes}`);

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'reload-ig-config.yml',
              ref: 'main',
              inputs: {
                base_url: 'https://smile.sparked-fhir.com',
                nodes: nodes,
                package_source: 'config',
                dry_run: 'false',
                force_reinstall: 'false',
                issue_number: issueNumber.toString()
              }
            });

            // Post comment that deployment was triggered
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🚀 **Your Deployment Request is Being Processed**

PR #${prNumber} has been merged and your request for immediate deployment is being fulfilled.

**Deployment Details:**
- **Nodes**: ${nodes}
- **Package Source**: config (from simplified-multinode.yaml)
- **Mode**: Live deployment (dry_run=false)

You will receive another comment with the deployment results once the workflow completes.

[View Workflow Runs](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/workflows/reload-ig-config.yml)

---
*Automated deployment triggered per your request*`
            });

            // Update issue labels for auto-deployment
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['status:deploying']
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'status:in-progress'
              });
            } catch (e) {
              // Label might not exist
            }

      - name: Post deployment options comment
        if: steps.extract.outputs.issue_number && steps.check_deploy.outputs.has_deploy_label != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.extract.outputs.issue_number }}');
            const prNumber = context.payload.pull_request.number;
            const prUrl = context.payload.pull_request.html_url;

            const comment = `## ✅ PR #${prNumber} Merged - Deployment Options

            Your requested changes have been reviewed, approved, and merged to main.

            ### Deployment Options Available

            **Option A: Immediate Deployment (Recommended)**
            A repo admin can deploy the packages immediately to the SmileCDR nodes without restarting the server.

            **Pros:**
            - ✅ Fast (takes ~2-5 minutes)
            - ✅ No server downtime
            - ✅ Changes applied immediately

            **Cons:**
            - ⚠️ May fail if package has dependency issues
            - ⚠️ Requires admin to trigger manually

            👉 **Admins: [Click here to deploy now](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/workflows/manual-ig-load.yml)**

            ---

            **Option B: Wait for Next Server Restart**
            Changes will be applied automatically the next time the SmileCDR nodes restart.

            **Pros:**
            - ✅ Zero risk
            - ✅ Fully automated
            - ✅ No manual intervention needed

            **Cons:**
            - ⏰ May take hours or days
            - ⏰ No control over timing

            ---

            ### ℹ️ What happens next?

            A repo admin will decide when to deploy based on urgency and risk assessment.

            **When deployment completes:**
            - You'll receive a notification on this issue
            - You'll be asked to verify the deployment meets your acceptance criteria
            - Once verified, this issue will be closed

            ---

            *Awaiting admin decision on deployment timing*`;

            // Post to the original issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            // Also post to the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `✅ Merged! The requester has been notified. Deployment options posted to issue #${issueNumber}.`
            });

            // Update issue labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['status:merged', 'awaiting-deployment']
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'status:in-progress'
              });
            } catch (e) {
              // Label might not exist
            }
