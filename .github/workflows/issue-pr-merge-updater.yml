name: Post-Merge IG Deployment

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  deployment-options:
    name: Post Deployment Options
    runs-on: ubuntu-latest
    # Only run if PR was merged and has ig-release label
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'auto-pr-created')

    steps:
      - name: Extract issue number from PR body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';

            // Extract issue number from "Closes #123" or "Issue #123"
            const issueMatch = prBody.match(/#(\d+)/);
            const issueNumber = issueMatch ? issueMatch[1] : null;

            core.setOutput('issue_number', issueNumber);

            return { issueNumber };

      - name: Post deployment options comment
        if: steps.extract.outputs.issue_number
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt('${{ steps.extract.outputs.issue_number }}');
            const prNumber = context.payload.pull_request.number;
            const prUrl = context.payload.pull_request.html_url;

            const comment = `## ✅ PR #${prNumber} Merged - Choose Deployment Method

            The configuration has been updated and merged to main. Choose how to deploy the IG packages:

            ### Option A: Automatic Deployment (Recommended)
            Deploy the packages immediately to the SmileCDR nodes without restarting the server.

            **Pros:**
            - ✅ Fast (takes ~2-5 minutes)
            - ✅ No server downtime
            - ✅ Changes applied immediately

            **Cons:**
            - ⚠️ May fail if package has dependency issues
            - ⚠️ Requires manual trigger

            👉 **[Click here to deploy now](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/workflows/manual-ig-load.yml)**
            - Select "Run workflow"
            - Use default settings (reads from config)
            - Set \`dry_run=false\` to apply changes

            ---

            ### Option B: Wait for Next Server Restart
            Changes will be applied automatically the next time the SmileCDR nodes restart.

            **Pros:**
            - ✅ Zero risk
            - ✅ Fully automated
            - ✅ No manual intervention needed

            **Cons:**
            - ⏰ May take hours or days
            - ⏰ No control over timing

            👉 **No action needed** - changes will apply on next restart

            ---

            ### ℹ️ What happens next?

            **If you choose Option A (Automatic Deployment):**
            1. Run the manual-ig-load workflow
            2. Monitor the workflow output
            3. Verify packages are installed correctly
            4. Comment back on this issue with verification results

            **If you choose Option B:**
            - Update this issue when deployment is complete
            - Verify the IG is working as expected
            - Close this issue once verified

            ---

            *Deployment options posted automatically after PR merge*`;

            // Post to the original issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            // Also post to the PR
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `✅ Merged! Deployment options have been posted to issue #${issueNumber}.`
            });

            // Update issue labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['status:merged', 'awaiting-deployment']
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'status:in-progress'
              });
            } catch (e) {
              // Label might not exist
            }
