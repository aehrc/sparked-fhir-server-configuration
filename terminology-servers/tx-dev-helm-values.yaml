# -- Run mode: "server" deploys a Deployment with web UI + poll loop.
# -- "cron" deploys a CronJob that syncs on a schedule.
# -- "both" deploys both.
mode: server

# -- CronJob schedule (only used when mode is "cron" or "both")
cronSchedule: "*/30 * * * *"

server:
  port: 8080

pollInterval: "5m"

targets:
  - name: atomio-tx
    type: atomio
    baseUrl: https://synd.ontoserver.csiro.au
    auth:
      type: keycloak
      existingSecret: fhir-ig-feeder-tx-dev-secrets  # ExternalSecret-managed; keys: atomio-tx-client-id, atomio-tx-client-secret
      keycloak:
        url: https://auth.ontoserver.csiro.au
        realm: aehrc
        scopes:
          - onto/synd.read
          - onto/synd.write
          - syndication-server
    feeds:
      - feedName: hl7au-dev
        feedTitle: HL7 Australia Develop Server
        createIfAbsent: false
        packageFeedUrl: https://hl7.org.au/fhir/package-feed.xml
        watches:
          - packageId: hl7.fhir.au.base
            packageListUrl: https://hl7.org.au/fhir/package-list.json
            displayName: AU Base
            statuses: [ballot, preview, draft, trial-use]
            versionMode: latest-any
          - packageId: hl7.fhir.au.core
            packageListUrl: https://hl7.org.au/fhir/core/package-list.json
            statuses: [ballot, preview, draft, trial-use]
            versionMode: latest-any
          - packageId: hl7.fhir.au.ereq
            packageListUrl: https://hl7.org.au/fhir/ereq/package-list.json
            statuses: [ballot, preview, draft, trial-use]
            versionMode: latest-any
          - packageId: hl7.fhir.au.ps
            packageListUrl: https://hl7.org.au/fhir/ps/package-list.json
            statuses:
              - ballot
            versionMode: pinned
            versions:
              - 1.0.0-ballot


resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
